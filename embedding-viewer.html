<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sento — Embedding Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a10;
    color: #ccc;
    font-family: 'Consolas', 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-y: auto;
  }

  /* ─── Audio source picker ─────────────────────────────────────────── */
  #source-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 10px 18px;
    background: rgba(14, 14, 22, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    font-family: system-ui, sans-serif;
    font-size: 13px;
  }
  #source-bar button {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    color: #ddd;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
  }
  #source-bar button:hover { background: rgba(255,255,255,0.14); }
  #source-bar button.active {
    background: rgba(60,140,255,0.25);
    border-color: rgba(60,140,255,0.45);
    color: #fff;
  }
  #source-bar .separator {
    width: 1px;
    height: 22px;
    background: rgba(255,255,255,0.1);
  }
  #file-input { display: none; }
  #source-label {
    margin-left: auto;
    color: rgba(255,255,255,0.35);
    font-style: italic;
    font-size: 11px;
  }

  /* ─── Main grid ───────────────────────────────────────────────────── */
  #panels {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    padding: 1px;
    background: rgba(255,255,255,0.03);
  }
  @media (max-width: 900px) { #panels { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px) { #panels { grid-template-columns: 1fr; } }

  .panel {
    background: rgba(10,10,18,0.95);
    padding: 14px 16px;
  }
  .panel-title {
    font-family: system-ui, sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.3);
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding-bottom: 6px;
  }

  /* ─── Stat rows ───────────────────────────────────────────────────── */
  .stat-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 2px 0;
    transition: color 0.25s;
  }
  .stat-label {
    width: 110px;
    flex-shrink: 0;
    color: rgba(255,255,255,0.38);
    font-size: 11px;
  }
  .stat-bar-wrap {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .stat-bar {
    position: absolute;
    top: 0;
    height: 100%;
    border-radius: 3px;
    transition: width 0.08s linear, left 0.08s linear, background 0.25s;
  }
  /* For [0,1] bars — fill from left */
  .stat-bar.positive { left: 0; background: rgba(80,180,255,0.55); }
  /* For [-1,1] bars — centered at 50% */
  .stat-bar.signed-pos { background: rgba(100,200,140,0.6); }
  .stat-bar.signed-neg { background: rgba(220,100,100,0.55); }

  .stat-value {
    width: 62px;
    text-align: right;
    flex-shrink: 0;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }

  /* ─── Trailing coordinate HUD (bottom panel) ─────────────────────── */
  #trail-panel {
    grid-column: 1 / -1;
  }
  #coord-hud {
    white-space: pre;
    line-height: 1.55;
    letter-spacing: 0.03em;
    max-height: 320px;
    overflow: hidden;
    mask-image: linear-gradient(to bottom, #fff 40%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, #fff 40%, transparent 100%);
  }
  #coord-hud .coord-row {
    display: block;
    transition: color 0.3s ease;
  }

  /* ─── Color swatch ────────────────────────────────────────────────── */
  #color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
    display: inline-block;
    vertical-align: middle;
    margin-left: 8px;
    transition: background 0.12s;
  }
</style>
</head>
<body>

<!-- ─── Source picker ─────────────────────────────────────────────────────── -->
<div id="source-bar">
  <button id="btn-demo" class="active">Demo</button>
  <button id="btn-mic">Mic</button>
  <div class="separator"></div>
  <button id="btn-file">Load file…</button>
  <input type="file" id="file-input" accept="audio/*">
  <span id="source-label">demo</span>
</div>

<!-- ─── Stat panels ──────────────────────────────────────────────────────── -->
<div id="panels">
  <!-- Low-level features -->
  <div class="panel" id="panel-features">
    <div class="panel-title">Low-Level Features</div>
  </div>

  <!-- Derived state -->
  <div class="panel" id="panel-derived">
    <div class="panel-title">Derived State</div>
  </div>

  <!-- Final embedding point -->
  <div class="panel" id="panel-output">
    <div class="panel-title">Embedding Point Output</div>
  </div>

  <!-- Signed variants -->
  <div class="panel" id="panel-signed">
    <div class="panel-title">Signed Variants</div>
  </div>

  <!-- 3D target coords -->
  <div class="panel" id="panel-targets">
    <div class="panel-title">3D Target Coordinates</div>
  </div>

  <!-- Spectrum preview -->
  <div class="panel" id="panel-spectrum">
    <div class="panel-title">Spectrum (L / R)</div>
    <canvas id="spectrum-canvas" width="320" height="100" style="width:100%;height:100px;border-radius:4px;background:rgba(0,0,0,0.3);"></canvas>
  </div>

  <!-- Trailing coord HUD -->
  <div class="panel" id="trail-panel">
    <div class="panel-title">Coordinate Trail (newest → oldest)</div>
    <div id="coord-hud"></div>
  </div>
</div>

<script type="module">
// ─── Inline config defaults (matches config.js) ──────────────────────────
const cfg = {
  trailLength: 600,
  spaceScale: 12,
  energySensitivity: 1.0,
  mappingMode: 'latent',
  xFeature: 'brightness',
  yFeature: 'presence',
  zFeature: 'texture',
  xEmphasis: 1.0,
  yEmphasis: 1.0,
  zEmphasis: 1.0,
};

// ═══════════════════════════════════════════════════════════════════════════
// Embedding pipeline (inlined from embedding.js so this page is standalone)
// ═══════════════════════════════════════════════════════════════════════════
const BINS_PER_CHANNEL = 64;
const EPS = 1e-6;
const prevMono = new Float32Array(BINS_PER_CHANNEL);
const prevPoint = { x: 0, y: 0, z: 0, energy: 0 };

function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }
function clamp01(v) { return clamp(v, 0, 1); }
function clampSigned(v) { return clamp(v, -1, 1); }
function wrap01(v) { return ((v % 1) + 1) % 1; }

function decodeStereoSpectrum(raw) {
  const left = new Float32Array(BINS_PER_CHANNEL);
  const right = new Float32Array(BINS_PER_CHANNEL);
  if (!raw || raw.length === 0) return { left, right };
  if (raw.length >= BINS_PER_CHANNEL * 2) {
    for (let i = 0; i < BINS_PER_CHANNEL; i++) {
      left[i] = clamp01(Number(raw[i]) || 0);
      right[i] = clamp01(Number(raw[i + BINS_PER_CHANNEL]) || 0);
    }
    return { left, right };
  }
  const n = Math.min(BINS_PER_CHANNEL, raw.length);
  for (let i = 0; i < n; i++) { const v = clamp01(Number(raw[i]) || 0); left[i] = v; right[i] = v; }
  return { left, right };
}

function extractEmbeddingFeatures(raw) {
  const { left, right } = decodeStereoSpectrum(raw);
  const mono = new Float32Array(BINS_PER_CHANNEL);
  let amplitudeSum = 0, energySum = 0, leftEnergy = 0, rightEnergy = 0;
  let centroidNum = 0, diffSum = 0, fluxSum = 0, geoSum = 0;
  let low = 0, mid = 0, high = 0;

  for (let i = 0; i < BINS_PER_CHANNEL; i++) {
    const l = left[i], r = right[i], m = (l + r) * 0.5;
    const freq = i / (BINS_PER_CHANNEL - 1);
    mono[i] = m;
    amplitudeSum += m; energySum += m * m;
    leftEnergy += l * l; rightEnergy += r * r;
    centroidNum += freq * m; diffSum += Math.abs(l - r);
    fluxSum += Math.max(0, m - prevMono[i]);
    geoSum += Math.log(Math.max(m, EPS));
    if (freq < 0.22) low += m; else if (freq < 0.6) mid += m; else high += m;
  }

  const energy = Math.sqrt(energySum / BINS_PER_CHANNEL);
  const centroid = amplitudeSum > EPS ? centroidNum / amplitudeSum : 0.5;
  let spreadNum = 0, cumulative = 0, rolloff = 0.5;
  const rolloffThreshold = amplitudeSum * 0.85;
  for (let i = 0; i < BINS_PER_CHANNEL; i++) {
    const freq = i / (BINS_PER_CHANNEL - 1), diff = freq - centroid, v = mono[i];
    spreadNum += diff * diff * v; cumulative += v;
    if (amplitudeSum > EPS && rolloff === 0.5 && cumulative >= rolloffThreshold) rolloff = freq;
  }
  const spread = amplitudeSum > EPS ? Math.sqrt(spreadNum / amplitudeSum) : 0;
  const arithmeticMean = amplitudeSum / BINS_PER_CHANNEL;
  const flatness = arithmeticMean > EPS ? Math.exp(geoSum / BINS_PER_CHANNEL) / arithmeticMean : 0;
  const balance = (rightEnergy - leftEnergy) / (rightEnergy + leftEnergy + EPS);
  const width = clamp01(diffSum / (amplitudeSum * 2 + EPS));
  const flux = clamp01((fluxSum / BINS_PER_CHANNEL) * 6);
  const lowRatio = low / (amplitudeSum + EPS);
  const midRatio = mid / (amplitudeSum + EPS);
  const highRatio = high / (amplitudeSum + EPS);
  const lowHighTilt = (high - low) / (amplitudeSum + EPS);

  for (let i = 0; i < BINS_PER_CHANNEL; i++) prevMono[i] = mono[i];

  return { energy, centroid, spread, rolloff, flatness, balance, width, flux,
           lowRatio, midRatio, highRatio, lowHighTilt, left, right };
}

function toCentered(v) { return clampSigned(v * 2 - 1); }

function deriveState(raw) {
  const f = extractEmbeddingFeatures(raw);
  const brightness = clampSigned(f.lowHighTilt * 1.35 + (f.centroid - 0.5) * 1.1 + (f.rolloff - 0.5) * 0.7);
  const texture = clampSigned((f.flatness - 0.28) * 1.8 + (f.spread - 0.18) * 2.6 + f.width * 0.55 - f.midRatio * 0.25);
  const transient = clamp01(Math.max(0, f.energy - prevPoint.energy) * 3.2 + f.flux * 0.9);
  const presence = clamp01(f.energy * Math.min(cfg.energySensitivity, 2.5) * 1.25 + transient * 0.35);
  return {
    ...f, brightness, texture, transient, presence,
    centroidSigned: clampSigned((f.centroid - 0.5) * 2),
    spreadSigned: clampSigned((f.spread - 0.18) * 5),
    rolloffSigned: clampSigned((f.rolloff - 0.5) * 2),
    flatnessSigned: clampSigned((f.flatness - 0.28) * 3),
    widthSigned: toCentered(f.width),
    presenceSigned: toCentered(presence),
    transientSigned: toCentered(transient),
    lowSigned: clampSigned((f.lowRatio - 0.34) * 3.2),
    midSigned: clampSigned((f.midRatio - 0.38) * 3.2),
    highSigned: clampSigned((f.highRatio - 0.28) * 3.2),
  };
}

function resolveCustomFeatureValue(feature, state) {
  const map = {
    presence: state.presenceSigned, texture: state.texture, balance: state.balance,
    width: state.widthSigned, transient: state.transientSigned, centroid: state.centroidSigned,
    spread: state.spreadSigned, flatness: state.flatnessSigned, low: state.lowSigned,
    mid: state.midSigned, high: state.highSigned, rolloff: state.rolloffSigned,
  };
  return map[feature] ?? state.brightness;
}

function computeTargets(state) {
  if (cfg.mappingMode === 'classic') {
    return { x: (state.centroid - 0.5) * 2 * cfg.spaceScale, y: state.presence * cfg.spaceScale * 1.5, z: (state.spread - 0.15) * 4 * cfg.spaceScale };
  }
  if (cfg.mappingMode === 'custom') {
    return { x: resolveCustomFeatureValue(cfg.xFeature, state) * cfg.spaceScale * cfg.xEmphasis,
             y: resolveCustomFeatureValue(cfg.yFeature, state) * cfg.spaceScale * cfg.yEmphasis,
             z: resolveCustomFeatureValue(cfg.zFeature, state) * cfg.spaceScale * cfg.zEmphasis };
  }
  return {
    x: clampSigned(state.brightness * 0.82 + state.balance * 0.35) * cfg.spaceScale,
    y: clampSigned(-0.45 + state.presence * 1.5 + state.transient * 0.2) * cfg.spaceScale * 1.3,
    z: clampSigned(state.texture * 0.75 + state.width * 0.4 + state.balance * 0.15) * cfg.spaceScale,
  };
}

function createEmbeddingPoint(raw) {
  const state = deriveState(raw);
  const targets = computeTargets(state);
  const x = prevPoint.x + (targets.x - prevPoint.x) * 0.32;
  const y = prevPoint.y + (targets.y - prevPoint.y) * 0.28;
  const z = prevPoint.z + (targets.z - prevPoint.z) * 0.32;
  const size = 0.07 + state.presence * 0.42 + state.transient * 0.18 + state.width * 0.08;
  const hue = wrap01(0.03 + ((state.brightness + 1) * 0.5) * 0.62 + state.width * 0.05);
  const saturation = clamp01(0.5 + state.width * 0.25 + state.transient * 0.2 + state.flatness * 0.15);
  const lightness = clamp01(0.22 + state.presence * 0.38 + state.transient * 0.15);
  prevPoint.x = x; prevPoint.y = y; prevPoint.z = z; prevPoint.energy = state.energy;
  return { x, y, z, size, hue, saturation, lightness, energy: state.presence,
           transient: state.transient, brightness: state.brightness, texture: state.texture,
           width: state.width, balance: state.balance, centroid: state.centroid,
           _state: state, _targets: targets };
}

// ═══════════════════════════════════════════════════════════════════════════
// Audio source wiring (mirrors audio.js)
// ═══════════════════════════════════════════════════════════════════════════
let latestRaw = null;
let latestState = null;
let latestPoint = null;
const history = [];

function onAudioData(raw) {
  latestRaw = raw;
  latestPoint = createEmbeddingPoint(raw);
  latestState = latestPoint._state;
  history.push(latestPoint);
  if (history.length > 128) history.shift();
}

function analyseSource(ctx, sourceNode) {
  const splitter = ctx.createChannelSplitter(2);
  const leftAn = ctx.createAnalyser();
  const rightAn = ctx.createAnalyser();
  leftAn.fftSize = 128; rightAn.fftSize = 128;
  leftAn.smoothingTimeConstant = 0.65; rightAn.smoothingTimeConstant = 0.65;
  sourceNode.connect(splitter);
  splitter.connect(leftAn, 0); splitter.connect(rightAn, 1);
  const lBuf = new Float32Array(leftAn.frequencyBinCount);
  const rBuf = new Float32Array(rightAn.frequencyBinCount);
  function tick() {
    leftAn.getFloatFrequencyData(lBuf); rightAn.getFloatFrequencyData(rBuf);
    let rLevel = 0;
    for (let i = 0; i < rBuf.length; i++) rLevel += Math.max(0, (rBuf[i] + 80) / 80);
    const norm = new Float32Array(128);
    const hasR = rLevel > 0.01;
    for (let i = 0; i < 64; i++) {
      const l = Math.max(0, (lBuf[i] + 80) / 80);
      const r = Math.max(0, (rBuf[i] + 80) / 80);
      norm[i] = l; norm[i + 64] = hasR ? r : l;
    }
    onAudioData(norm);
    requestAnimationFrame(tick);
  }
  tick();
}

function startDemo() {
  let t = 0;
  function demo() {
    t += 0.025;
    const fake = new Float32Array(128);
    const phrase = Math.floor(t / 2.8) % 5;
    const phrasePos = (t % 2.8) / 2.8;
    const basePitch = [0.18, 0.48, 0.32, 0.74, 0.56][phrase];
    const pitchDrift = Math.sin(t * 4.5) * 0.05 + Math.sin(t * 10.5) * 0.03;
    const pan = Math.sin(t * 0.8) * 0.55 + Math.sin(t * 0.23) * 0.18;
    const width = 0.08 + (0.5 + 0.5 * Math.sin(t * 1.7 + phrase)) * 0.2;
    const brightness = 0.45 + 0.35 * Math.sin(t * 0.6 + phrase);
    const envelope = 0.16 + Math.pow(Math.sin(phrasePos * Math.PI), 1.5) * 0.9;
    for (let i = 0; i < 64; i++) {
      const f = i / 63;
      const lc = basePitch + pitchDrift - pan * 0.05 - width * 0.03;
      const rc = basePitch + pitchDrift + pan * 0.05 + width * 0.03;
      const lBody = Math.exp(-Math.pow(f - lc, 2) * (70 - brightness * 25));
      const rBody = Math.exp(-Math.pow(f - rc, 2) * (70 - brightness * 25));
      const lH = Math.exp(-Math.pow(f - (lc + 0.14), 2) * 150) * 0.45;
      const rH = Math.exp(-Math.pow(f - (rc + 0.14), 2) * 150) * 0.45;
      const noise = Math.random() * (0.02 + brightness * 0.08);
      fake[i] = Math.min(1, (lBody + lH) * envelope + noise);
      fake[i + 64] = Math.min(1, (rBody + rH) * envelope + noise * (0.7 + width));
    }
    onAudioData(fake);
    requestAnimationFrame(demo);
  }
  demo();
}

async function startMic() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const ctx = new AudioContext();
  analyseSource(ctx, ctx.createMediaStreamSource(stream));
}

async function startFile(file) {
  const ctx = new AudioContext();
  const buf = await ctx.decodeAudioData(await file.arrayBuffer());
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  src.connect(ctx.destination);
  analyseSource(ctx, src);
  src.start(0);
}

// ═══════════════════════════════════════════════════════════════════════════
// UI — stat rows builder
// ═══════════════════════════════════════════════════════════════════════════
function createStatRow(parent, label, mode = 'positive') {
  const row = document.createElement('div');
  row.className = 'stat-row';

  const lbl = document.createElement('span');
  lbl.className = 'stat-label';
  lbl.textContent = label;

  const barWrap = document.createElement('div');
  barWrap.className = 'stat-bar-wrap';
  const bar = document.createElement('div');
  bar.className = 'stat-bar';
  barWrap.appendChild(bar);

  const val = document.createElement('span');
  val.className = 'stat-value';

  row.append(lbl, barWrap, val);
  parent.appendChild(row);

  return { bar, val, mode };
}

function updateStatRow(ref, value, color) {
  const v = Number(value) || 0;
  ref.val.textContent = v.toFixed(4);
  if (color) ref.val.style.color = color;

  if (ref.mode === 'signed') {
    // [-1, 1] — centre is 50%
    const pct = Math.abs(v) * 50;
    if (v >= 0) {
      ref.bar.className = 'stat-bar signed-pos';
      ref.bar.style.left = '50%';
      ref.bar.style.width = pct + '%';
    } else {
      ref.bar.className = 'stat-bar signed-neg';
      ref.bar.style.left = (50 - pct) + '%';
      ref.bar.style.width = pct + '%';
    }
  } else if (ref.mode === 'coord') {
    // arbitrary range centred on 0 — map [-spaceScale, spaceScale] → bar
    const range = cfg.spaceScale;
    const norm = clamp((v / range + 1) * 0.5, 0, 1);
    const pctAbs = Math.abs(norm - 0.5) * 100;
    if (v >= 0) {
      ref.bar.className = 'stat-bar signed-pos';
      ref.bar.style.left = '50%';
      ref.bar.style.width = pctAbs + '%';
    } else {
      ref.bar.className = 'stat-bar signed-neg';
      ref.bar.style.left = (50 - pctAbs) + '%';
      ref.bar.style.width = pctAbs + '%';
    }
  } else {
    // [0, 1]
    ref.bar.className = 'stat-bar positive';
    ref.bar.style.left = '0';
    ref.bar.style.width = (clamp01(v) * 100) + '%';
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// Build stat rows for each panel
// ═══════════════════════════════════════════════════════════════════════════
const pFeatures = document.getElementById('panel-features');
const pDerived = document.getElementById('panel-derived');
const pOutput = document.getElementById('panel-output');
const pSigned = document.getElementById('panel-signed');
const pTargets = document.getElementById('panel-targets');

const featureRows = {
  energy:      createStatRow(pFeatures, 'energy'),
  centroid:    createStatRow(pFeatures, 'centroid'),
  spread:      createStatRow(pFeatures, 'spread'),
  rolloff:     createStatRow(pFeatures, 'rolloff'),
  flatness:    createStatRow(pFeatures, 'flatness'),
  balance:     createStatRow(pFeatures, 'balance',    'signed'),
  width:       createStatRow(pFeatures, 'width'),
  flux:        createStatRow(pFeatures, 'flux'),
  lowRatio:    createStatRow(pFeatures, 'lowRatio'),
  midRatio:    createStatRow(pFeatures, 'midRatio'),
  highRatio:   createStatRow(pFeatures, 'highRatio'),
  lowHighTilt: createStatRow(pFeatures, 'lowHighTilt','signed'),
};

const derivedRows = {
  brightness: createStatRow(pDerived, 'brightness', 'signed'),
  texture:    createStatRow(pDerived, 'texture',    'signed'),
  transient:  createStatRow(pDerived, 'transient'),
  presence:   createStatRow(pDerived, 'presence'),
};

const signedRows = {
  centroidSigned:  createStatRow(pSigned, 'centroidS',  'signed'),
  spreadSigned:    createStatRow(pSigned, 'spreadS',    'signed'),
  rolloffSigned:   createStatRow(pSigned, 'rolloffS',   'signed'),
  flatnessSigned:  createStatRow(pSigned, 'flatnessS',  'signed'),
  widthSigned:     createStatRow(pSigned, 'widthS',     'signed'),
  presenceSigned:  createStatRow(pSigned, 'presenceS',  'signed'),
  transientSigned: createStatRow(pSigned, 'transientS', 'signed'),
  lowSigned:       createStatRow(pSigned, 'lowS',       'signed'),
  midSigned:       createStatRow(pSigned, 'midS',       'signed'),
  highSigned:      createStatRow(pSigned, 'highS',      'signed'),
};

// Add a color swatch next to output title
const swatchEl = document.createElement('span');
swatchEl.id = 'color-swatch';
pOutput.querySelector('.panel-title').appendChild(swatchEl);

const outputRows = {
  x:          createStatRow(pOutput, 'x',          'coord'),
  y:          createStatRow(pOutput, 'y',          'coord'),
  z:          createStatRow(pOutput, 'z',          'coord'),
  size:       createStatRow(pOutput, 'size'),
  hue:        createStatRow(pOutput, 'hue'),
  saturation: createStatRow(pOutput, 'saturation'),
  lightness:  createStatRow(pOutput, 'lightness'),
  energy:     createStatRow(pOutput, 'energy (presence)'),
  transient:  createStatRow(pOutput, 'transient'),
  brightness: createStatRow(pOutput, 'brightness', 'signed'),
  texture:    createStatRow(pOutput, 'texture',    'signed'),
  width:      createStatRow(pOutput, 'width'),
  balance:    createStatRow(pOutput, 'balance',    'signed'),
  centroid:   createStatRow(pOutput, 'centroid'),
};

const targetRows = {
  tx: createStatRow(pTargets, 'target X', 'coord'),
  ty: createStatRow(pTargets, 'target Y', 'coord'),
  tz: createStatRow(pTargets, 'target Z', 'coord'),
};

// ═══════════════════════════════════════════════════════════════════════════
// Coordinate trail HUD
// ═══════════════════════════════════════════════════════════════════════════
const HUD_ROWS = 48;
const hudEl = document.getElementById('coord-hud');
const hudRows = [];
for (let i = 0; i < HUD_ROWS; i++) {
  const span = document.createElement('span');
  span.className = 'coord-row';
  hudEl.appendChild(span);
  hudRows.push(span);
}

function hudRowColor(age) {
  const r = Math.round(180 - age * 110);
  const g = Math.round(70 - age * 30);
  const b = Math.round(70 - age * 30);
  const a = (1 - age * 0.7).toFixed(2);
  return `rgba(${r},${g},${b},${a})`;
}

function updateHud() {
  const n = Math.min(HUD_ROWS, history.length);
  for (let i = 0; i < HUD_ROWS; i++) {
    const row = hudRows[i];
    if (i >= n) { row.textContent = ''; continue; }
    const p = history[history.length - 1 - i];
    const age = i / (HUD_ROWS - 1);
    row.style.color = hudRowColor(age);
    row.textContent =
      `${p.x.toFixed(2).padStart(8)}  ${p.y.toFixed(2).padStart(8)}  ${p.z.toFixed(2).padStart(8)}` +
      `   E ${p.energy.toFixed(2)}  T ${p.transient.toFixed(2)}  B ${p.brightness.toFixed(2)}`;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// Spectrum canvas
// ═══════════════════════════════════════════════════════════════════════════
const specCanvas = document.getElementById('spectrum-canvas');
const specCtx = specCanvas.getContext('2d');

function drawSpectrum(state) {
  if (!state) return;
  const w = specCanvas.width, h = specCanvas.height;
  specCtx.clearRect(0, 0, w, h);
  const barW = w / BINS_PER_CHANNEL;

  // Left channel (blue-ish)
  specCtx.fillStyle = 'rgba(80,160,255,0.45)';
  for (let i = 0; i < BINS_PER_CHANNEL; i++) {
    const val = state.left ? state.left[i] : 0;
    specCtx.fillRect(i * barW, h - val * h, barW * 0.45, val * h);
  }
  // Right channel (red-ish)
  specCtx.fillStyle = 'rgba(255,100,100,0.4)';
  for (let i = 0; i < BINS_PER_CHANNEL; i++) {
    const val = state.right ? state.right[i] : 0;
    specCtx.fillRect(i * barW + barW * 0.5, h - val * h, barW * 0.45, val * h);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// Render loop
// ═══════════════════════════════════════════════════════════════════════════
let frameTick = 0;

function render() {
  requestAnimationFrame(render);
  if (!latestState || !latestPoint) return;

  // Throttle DOM updates to every 2nd frame
  if (++frameTick % 2 !== 0) return;

  const s = latestState;
  const p = latestPoint;

  // Features
  for (const key of Object.keys(featureRows)) {
    updateStatRow(featureRows[key], s[key]);
  }

  // Derived
  for (const key of Object.keys(derivedRows)) {
    updateStatRow(derivedRows[key], s[key]);
  }

  // Signed
  for (const key of Object.keys(signedRows)) {
    updateStatRow(signedRows[key], s[key]);
  }

  // Output
  for (const key of Object.keys(outputRows)) {
    updateStatRow(outputRows[key], p[key]);
  }

  // Targets
  updateStatRow(targetRows.tx, p._targets.x);
  updateStatRow(targetRows.ty, p._targets.y);
  updateStatRow(targetRows.tz, p._targets.z);

  // Color swatch
  const h = Math.round(p.hue * 360);
  const sat = Math.round(p.saturation * 100);
  const lit = Math.round(p.lightness * 100);
  swatchEl.style.background = `hsl(${h}, ${sat}%, ${lit}%)`;

  // Spectrum
  drawSpectrum(s);

  // Trail HUD
  updateHud();
}
render();

// ═══════════════════════════════════════════════════════════════════════════
// Source picker wiring
// ═══════════════════════════════════════════════════════════════════════════
const btnDemo = document.getElementById('btn-demo');
const btnMic  = document.getElementById('btn-mic');
const btnFile = document.getElementById('btn-file');
const fileIn  = document.getElementById('file-input');
const srcLabel = document.getElementById('source-label');
let activeSource = null;

function setActiveBtn(btn) {
  [btnDemo, btnMic, btnFile].forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Start demo immediately
startDemo();
activeSource = 'demo';

btnDemo.addEventListener('click', () => {
  if (activeSource === 'demo') return;
  location.reload(); // simplest way to reset state
});

btnMic.addEventListener('click', async () => {
  if (activeSource === 'mic') return;
  setActiveBtn(btnMic);
  srcLabel.textContent = 'microphone';
  try {
    await startMic();
    activeSource = 'mic';
  } catch (e) {
    srcLabel.textContent = 'mic denied';
    console.error(e);
  }
});

btnFile.addEventListener('click', () => fileIn.click());
fileIn.addEventListener('change', async () => {
  const file = fileIn.files[0];
  if (!file) return;
  setActiveBtn(btnFile);
  srcLabel.textContent = file.name;
  await startFile(file);
  activeSource = 'file';
});
</script>
</body>
</html>
