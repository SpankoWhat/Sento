<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sento</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Viewport container (holds the single Three.js canvas) -->
  <div id="viewport-container"></div>
  
  <!-- Spectrum band visualizer (top of main viewport) -->
  <canvas id="spectrum-hud"></canvas>
  <!-- Subtle grid lines separating the 4 viewports -->
  <div id="viewport-grid">
    <div class="vp-line-v"></div>
    <div class="vp-line-h1"></div>
    <div class="vp-line-h2"></div>
  </div>

  <!-- Audio callback bridge - must be non-module for WE to detect it -->
  <script>
    // This array will be filled by Wallpaper Engine
    window.audioData = null;
    
    // Callback function for Wallpaper Engine audio
    function wallpaperAudioListener(audioArray) {
      window.audioData = audioArray;
    }
    
    // Register immediately when Wallpaper Engine is present.
    if (typeof window.wallpaperRegisterAudioListener === 'function') {
      window.wallpaperRegisterAudioListener(wallpaperAudioListener);
    }
</script>

  <!-- Main app as module -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
